<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear nuevo usuario</title>
  <style>
    :root {
      color-scheme: light dark;
    }
  
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: Canvas;
      color: CanvasText;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  
    .container {
      min-height: 180px;
      width: 90%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }
  
    h2 {
      margin: 0;
      font-size: 18px;
    }
  
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 15px;
    }
  
    .buttons {
      display: flex;
      gap: 10px;
    }
  
    button {
      padding: 6px 14px;
      font-size: 14px;
      cursor: pointer;
    }
  </style>  
</head>
<body>
  <div class="container">
    <h2>Crear nuevo usuario</h2>
    <input type="text" id="input" placeholder="Nombre del usuario" autofocus />
    <div class="buttons">
      <button onclick="crear()">Crear</button>
      <button onclick="cancelar()">Cancelar</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    function crear() {
      const nombre = document.getElementById('input').value;
      ipcRenderer.send('usuarioNuevo', nombre);
    }
    function cancelar() {
      window.close();
    }
  </script>
</body>
</html>
